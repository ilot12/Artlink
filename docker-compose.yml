# ArtLink Docker Compose - PostgreSQL (프로덕션 용)
# 현재 개발 환경에서는 SQLite 사용, 프로덕션 전환 시 이 파일 사용
version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: artlink-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: artlink
      POSTGRES_USER: artlink
      POSTGRES_PASSWORD: artlink_dev_password
    ports:
      - "5432:5432"
    volumes:
      - artlink_pgdata:/var/lib/postgresql/data

volumes:
  artlink_pgdata:
